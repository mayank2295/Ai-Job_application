spring.config.import=optional:file:.env[.properties],optional:file:../.env[.properties]

server.port=8080

# H2 File-based Database
spring.datasource.url=jdbc:h2:file:./data/smarthire;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=./uploads

# Claude API
claude.api.key=${CLAUDE_API_KEY:your_key_here}
claude.api.url=${CLAUDE_API_URL:https://api.anthropic.com/v1/messages}
claude.model=${CLAUDE_MODEL:claude-sonnet-4-6}

# Python Service
python.service.url=${PYTHON_SERVICE_URL:http://localhost:8001}

# CORS
allowed.origins=${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

logging.level.com.smarthire=INFO

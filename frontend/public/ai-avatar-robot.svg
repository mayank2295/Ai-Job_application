<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Robot assistant">
  <defs>
    <linearGradient id="shell" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#e5e7eb"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#0b1020" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Antenna -->
  <path d="M64 18v12" stroke="#e5e7eb" stroke-width="6" stroke-linecap="round"/>
  <circle cx="64" cy="16" r="8" fill="url(#accent)"/>

  <!-- Head -->
  <rect x="24" y="28" width="80" height="72" rx="22" fill="url(#shell)" filter="url(#soft)"/>
  <rect x="24" y="28" width="80" height="72" rx="22" fill="none" stroke="#111827" stroke-opacity="0.14" stroke-width="2"/>

  <!-- Face plate -->
  <rect x="34" y="40" width="60" height="40" rx="16" fill="#0f172a" opacity="0.92"/>

  <!-- Eyes -->
  <circle cx="52" cy="60" r="8" fill="url(#accent)"/>
  <circle cx="76" cy="60" r="8" fill="url(#accent)"/>
  <circle cx="52" cy="60" r="3" fill="#ffffff" opacity="0.9"/>
  <circle cx="76" cy="60" r="3" fill="#ffffff" opacity="0.9"/>

  <!-- Smile bar -->
  <path d="M50 76h28" stroke="#e5e7eb" stroke-width="6" stroke-linecap="round" opacity="0.9"/>

  <!-- Side bolts -->
  <circle cx="22" cy="62" r="6" fill="#9ca3af"/>
  <circle cx="106" cy="62" r="6" fill="#9ca3af"/>
</svg>

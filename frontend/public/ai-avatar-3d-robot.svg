<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="3D robot assistant">
  <defs>
    <!-- Shell gradients -->
    <linearGradient id="shell" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.55" stop-color="#eef2f7"/>
      <stop offset="1" stop-color="#cfd6df"/>
    </linearGradient>
    <linearGradient id="shell2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#cbd5e1"/>
    </linearGradient>

    <!-- Face gradients -->
    <radialGradient id="face" cx="35%" cy="30%" r="90%">
      <stop offset="0" stop-color="#0b2a3b"/>
      <stop offset="0.55" stop-color="#071a26"/>
      <stop offset="1" stop-color="#050d14"/>
    </radialGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6ee7ff"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>

    <!-- Soft shadows -->
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#0b1020" flood-opacity="0.35"/>
    </filter>
    <filter id="glowFilter" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#38bdf8" flood-opacity="0.55"/>
    </filter>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="128" cy="228" rx="56" ry="12" fill="#0b1020" opacity="0.18"/>

  <!-- Head group -->
  <g filter="url(#shadow)">
    <!-- Side pods -->
    <path d="M58 92c-14 0-26 12-26 26v18c0 14 12 26 26 26h10V92H58Z" fill="url(#shell2)"/>
    <path d="M198 92h-10v70h10c14 0 26-12 26-26v-18c0-14-12-26-26-26Z" fill="url(#shell2)"/>

    <!-- Outer helmet -->
    <path d="M128 44c-54 0-98 35-98 84v30c0 20 16 36 36 36h124c20 0 36-16 36-36v-30c0-49-44-84-98-84Z" fill="url(#shell)"/>

    <!-- Top highlight -->
    <path d="M70 82c18-18 44-28 74-28 26 0 50 8 68 22-18-26-48-42-84-42-36 0-68 18-88 48 10-2 20-2 30 0Z" fill="#ffffff" opacity="0.55"/>

    <!-- Face frame -->
    <path d="M78 92c-16 0-30 12-30 28v32c0 16 14 28 30 28h100c16 0 30-12 30-28v-32c0-16-14-28-30-28H78Z" fill="#111827" opacity="0.12"/>
    <path d="M84 98c-14 0-26 10-26 24v28c0 14 12 24 26 24h88c14 0 26-10 26-24v-28c0-14-12-24-26-24H84Z" fill="url(#face)"/>

    <!-- Face gloss -->
    <path d="M92 110c-12 4-22 14-22 26v4c10-18 34-28 62-28 22 0 42 6 54 16v-4c0-14-12-24-26-24H92Z" fill="#ffffff" opacity="0.10"/>

    <!-- Eyes -->
    <g filter="url(#glowFilter)">
      <path d="M96 132c0-10 9-18 20-18 12 0 22 8 22 18 0 10-10 18-22 18-11 0-20-8-20-18Z" fill="url(#glow)" opacity="0.95"/>
      <path d="M150 132c0-10 10-18 22-18 11 0 20 8 20 18 0 10-9 18-20 18-12 0-22-8-22-18Z" fill="url(#glow)" opacity="0.95"/>
      <circle cx="122" cy="130" r="4" fill="#e0f2fe" opacity="0.9"/>
      <circle cx="170" cy="130" r="4" fill="#e0f2fe" opacity="0.9"/>
    </g>

    <!-- Smile -->
    <path d="M120 158c0 8 8 14 18 14s18-6 18-14" fill="none" stroke="#67e8f9" stroke-width="10" stroke-linecap="round" opacity="0.85"/>

    <!-- Chin inner shadow -->
    <path d="M64 176c18 10 40 16 64 16s46-6 64-16v10c0 14-12 26-26 26H90c-14 0-26-12-26-26v-10Z" fill="#0b1020" opacity="0.10"/>
  </g>

  <!-- Body (simple floating torso) -->
  <g filter="url(#shadow)">
    <path d="M92 186c10 10 22 16 36 16s26-6 36-16c22 10 36 30 36 54 0 8-6 14-14 14H70c-8 0-14-6-14-14 0-24 14-44 36-54Z" fill="url(#shell2)"/>
    <path d="M84 206c10 10 26 16 44 16s34-6 44-16" fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round" opacity="0.35"/>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Panda assistant">
  <defs>
    <radialGradient id="g" cx="40%" cy="30%" r="80%">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f3f4f6"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#0b1020" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background circle (transparent; button provides gradient) -->

  <!-- Ears -->
  <circle cx="34" cy="34" r="18" fill="#0f172a"/>
  <circle cx="94" cy="34" r="18" fill="#0f172a"/>

  <!-- Head -->
  <circle cx="64" cy="70" r="44" fill="url(#g)" filter="url(#soft)"/>
  <circle cx="64" cy="70" r="44" fill="none" stroke="#111827" stroke-opacity="0.15" stroke-width="2"/>

  <!-- Eye patches -->
  <ellipse cx="46" cy="66" rx="18" ry="16" fill="#0f172a" opacity="0.92"/>
  <ellipse cx="82" cy="66" rx="18" ry="16" fill="#0f172a" opacity="0.92"/>

  <!-- Eyes -->
  <circle cx="48" cy="66" r="5.5" fill="#ffffff"/>
  <circle cx="80" cy="66" r="5.5" fill="#ffffff"/>
  <circle cx="49.5" cy="66" r="2.8" fill="#0f172a"/>
  <circle cx="81.5" cy="66" r="2.8" fill="#0f172a"/>

  <!-- Nose -->
  <path d="M64 74c6 0 10 4 10 8 0 5-6 9-10 9s-10-4-10-9c0-4 4-8 10-8Z" fill="#0f172a"/>

  <!-- Smile -->
  <path d="M50 92c6 8 22 8 28 0" fill="none" stroke="#0f172a" stroke-width="4" stroke-linecap="round" opacity="0.85"/>

  <!-- Little assistant sparkle (accent) -->
  <path d="M96 84l4 10 10 4-10 4-4 10-4-10-10-4 10-4 4-10Z" fill="url(#accent)" opacity="0.95"/>
</svg>
